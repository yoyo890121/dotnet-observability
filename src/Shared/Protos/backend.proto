syntax = "proto3";

option csharp_namespace = "Protos";

package orders;

service OrderService {
  rpc GetOrder (GetOrderRequest) returns (OrderReply);
  rpc PlaceOrder (PlaceOrderRequest) returns (OrderReply);
}

message GetOrderRequest {
  int32 id = 1;
}

message PlaceOrderRequest {
  string item = 1;
  int32 quantity = 2;
}

message OrderReply {
  int32 id = 1;
  string item = 2;
  int32 quantity = 3;
  string status = 4;
  string created_at = 5;
}
